<svg id="central" width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
    <script defer type="text/javascript">
        let SVG = "http://www.w3.org/2000/svg";

        function urlValue(value) {
            return location.search.match(value + "=([^&]+)")[1];
        }

        function loadTrack(url, track) {
            const req = new XMLHttpRequest();
            req.onload = function () {
                const text = req.responseText;
                var cover = text.match(`"product-lockup">(.|\\n)*?<\/div`)[0].match("https(.*?)webp")[0];
                var album = text.match(`h1 id(.|\n)*?\/h1>`)[0].match("(?<=>)([^><\\s].*?)(?=<)")[0];
                var artist = text.match(`product-creator(.|\\n)*?<\/a`)[0].match("(?<=>)([^><\\s].*?)(?=<)")[0];
                var title = text.match(new RegExp(/(?<=songs-list-row__song-name">)(.*)(?=<)/, "gm"))[track - 1].match("(?<=>)([^><\\s].*?)(?=<)")[0];
                

                console.log(cover, album, artist, title);
                var imgtag = document.createElementNS(SVG,"image");
                imgtag.setAttribute("href", cover);
                imgtag.setAttribute("width", "500");
                imgtag.setAttribute("height", "500");

                var albumtag = document.createElementNS(SVG, "text");
          
                albumtag.innerHTML = album;


                document.getElementById("central").appendChild(albumtag)
                document.getElementById("central").appendChild(imgtag)

            };
            
            req.open('GET', "https://cors.bridged.cc/" + url);
            req.send();
        }
       

        loadTrack(urlValue("album"), urlValue("track"));
    </script>
</svg>
